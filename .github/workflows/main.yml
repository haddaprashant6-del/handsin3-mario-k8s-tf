name: 🎮 Super Mario — EKS Deployment via Terraform cli

on:
  push:
    branches: [master, main]
    paths:
      - "EKS-TF/**"
      - ".github/workflows/**"
  pull_request:
    branches: [master, main]
    paths:
      - "EKS-TF/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: "us-east-1"
  EKS_CLUSTER_NAME: "EKS_CLOUD"
  TF_WORKING_DIR: "./EKS-TF"
  # Colorised Terraform output
  TF_CLI_ARGS: "-no-color"

permissions:
  id-token: write   # For OIDC auth to AWS#
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Terraform Lint & Validate###
  # ──────────────────────────────────────────────────────────────
  terraform-validate:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # - name: Configure AWS credentials (OIDC)##
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      #     aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=super-mario/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            #-backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── Post fmt/validate results on PRs ──
      - name: Comment PR with validation results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### 🖌 Terraform Format \`${{ steps.fmt.outcome }}\`
            #### ⚙️ Terraform Init \`${{ steps.init.outcome }}\`
            #### ✅ Terraform Validate \`${{ steps.validate.outcome }}\`

            <details><summary>Validate Output</summary>

            \`\`\`
            ${{ steps.validate.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Terraform Security Scan (tfsec / Checkov)
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-22.04
    needs: terraform-validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          soft_fail: true          # Set to false to block on HIGH findings

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          output_format: cli
          soft_fail: true
          skip_check: CKV_AWS_79   # Example skip — adjust as needed

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — Terraform Plan
  # ──────────────────────────────────────────────────────────────
  terraform-plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-22.04
    needs: [terraform-validate, security-scan]
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
         terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

    #  - name: Configure AWS credentials (OIDC)
    #    uses: aws-actions/configure-aws-credentials@v4
    #    with:
    #      role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
     #     aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=super-mario/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            #-backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="cluster_name=${{ env.EKS_CLUSTER_NAME }}" \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true

      - name: Save plan output
        run: terraform show -no-color tfplan > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan.txt
          retention-days: 5

      - name: Post plan summary on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n... (truncated)'
              : plan;

            const output = `#### 🗺️ Terraform Plan \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # ──────────────────────────────────────────────────────────────
  # JOB 4 — Terraform Apply (provision EKS + networking)
  # ──────────────────────────────────────────────────────────────
  terraform-apply:
    name: 🚀 Terraform Apply — Provision EKS
    runs-on: ubuntu-22.04
    needs: terraform-plan
    # Apply only on push to main/master OR manual workflow_dispatch apply
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment:
      name: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=super-mario/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Download saved plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf-outputs
        run: |
          echo "cluster_endpoint=$(terraform output -raw cluster_endpoint 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(terraform output -raw cluster_name 2>/dev/null || echo ${{ env.EKS_CLUSTER_NAME }})" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────
  # JOB 5 — Deploy Super Mario to EKS
  # ──────────────────────────────────────────────────────────────
  deploy-mario:
    name: 🎮 Deploy Super Mario to EKS
    runs-on: ubuntu-22.04
    needs: terraform-apply
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment:
      name: production
      url: ${{ steps.get-url.outputs.mario_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Deploy Super Mario — Deployment
        run: kubectl apply -f ${{ env.TF_WORKING_DIR }}/deployment.yaml

      - name: Deploy Super Mario — Service (LoadBalancer)
        run: kubectl apply -f ${{ env.TF_WORKING_DIR }}/service.yaml

      - name: Deploy HPA (Horizontal Pod Autoscaler)
        run: kubectl apply -f ${{ env.TF_WORKING_DIR }}/horizontal-pod-autoscaler.yaml

      - name: Apply Network Policies
        run: kubectl apply -f ${{ env.TF_WORKING_DIR }}/network-policy.yaml

      - name: Apply ServiceMonitor (Prometheus — optional)
        run: |
          kubectl apply -f ${{ env.TF_WORKING_DIR }}/service-monitor.yaml || \
          echo "⚠️ ServiceMonitor skipped — Prometheus CRDs not found"

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/mario-deployment \
            --timeout=180s

      - name: Get Mario LoadBalancer URL
        id: get-url
        run: |
          echo "⏳ Waiting for LoadBalancer external IP/hostname..."
          for i in {1..20}; do
            URL=$(kubectl get svc mario-service \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$URL" ]; then
              echo "mario_url=http://${URL}" >> "$GITHUB_OUTPUT"
              echo "🎮 Super Mario is live at: http://${URL}"
              break
            fi
            echo "Attempt ${i}/20 — waiting 15s..."
            sleep 15
          done

      - name: Show deployment status
        run: |
          echo "=== Pods ==="
          kubectl get pods -l app=mario -o wide
          echo ""
          echo "=== Service ==="
          kubectl get svc mario-service
          echo ""
          echo "=== HPA ==="
          kubectl get hpa mario-hpa || true

  # ──────────────────────────────────────────────────────────────
  # JOB 6 — Destroy (manual trigger only)
  # ──────────────────────────────────────────────────────────────
  terraform-destroy:
    name: 💥 Terraform Destroy
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment:
      name: production   # Requires manual approval in GitHub Environments
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }} || true

      - name: Remove Kubernetes resources first
        run: |
          kubectl delete -f ${{ env.TF_WORKING_DIR }}/service.yaml --ignore-not-found=true
          kubectl delete -f ${{ env.TF_WORKING_DIR }}/deployment.yaml --ignore-not-found=true
          kubectl delete -f ${{ env.TF_WORKING_DIR }}/horizontal-pod-autoscaler.yaml --ignore-not-found=true
          kubectl delete -f ${{ env.TF_WORKING_DIR }}/network-policy.yaml --ignore-not-found=true
          kubectl delete -f ${{ env.TF_WORKING_DIR }}/service-monitor.yaml --ignore-not-found=true || true
          echo "✅ Kubernetes resources removed"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=super-mario/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="cluster_name=${{ env.EKS_CLUSTER_NAME }}" \
            -auto-approve

